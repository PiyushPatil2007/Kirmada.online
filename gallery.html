<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Kirmada.Online</title>
  <meta name="description" content="View Kirmada.Online's gallery of digital masterpieces. Discover our premium web designs, AI ad creatives, and high-performance branding solutions.">
  <link rel="canonical" href="https://kirmada.online/gallery.html">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kirmada.online/gallery.html">
  <meta property="og:title" content="Gallery | Kirmada.Online">
  <meta property="og:description" content="View Kirmada.Online's gallery of digital masterpieces. Discover our premium web designs, AI ad creatives, and high-performance branding solutions.">
  <meta property="og:image" content="https://kirmada.online/large-logo.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://kirmada.online/gallery.html">
  <meta name="twitter:title" content="Gallery | Kirmada.Online">
  <meta name="twitter:description" content="View Kirmada.Online's gallery of digital masterpieces. Discover our premium web designs, AI ad creatives, and high-performance branding solutions.">
  <meta name="twitter:image" content="https://kirmada.online/large-logo.png">

  <link rel="icon" href="small-logo.png" type="image/png">
  <link rel="stylesheet" href="styles.css?v=6">
  <link rel="stylesheet" href="advanced-interactions.css?v=15">
  <!-- Gallery Styles moved to styles.css to work with Swup transitions -->
  <script type="module" src="dynamic-data.js?v=8"></script>
  <!-- Machine Experience (MX) Schema Markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Kirmada.Online Digital Masterpieces",
    "description": "A curated gallery of our premium web development, AI ad creatives, and brand aesthetics.",
    "publisher": {
      "@type": "Organization",
      "@id": "https://kirmada.online/#organization"
    },
    "mainEntity": {
      "@type": "ItemList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Brand Aesthetics"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Video & Ads"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Websites"
        }
      ]
    }
  }
  </script>
</head>
<body>

  <!-- Custom Brand Preloader -->
  <div id="preloader">
    <div class="preloader-track">
      <div class="preloader-bar"></div>
    </div>
    <div class="preloader-text-wrapper">
      <span class="preloader-text">KIRMADA</span>
    </div>
  </div>

  <!-- Lens Cursor -->
  <div id="lens-cursor"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container flex items-center justify-between" style="height: 100%;">
      <a href="index.html" class="nav-logo">
        <img src="large-logo.png" alt="Kirmada Logo" id="nav-small-logo" style="filter: hue-rotate(-115deg) saturate(1.5);">
      </a>
      <button class="hamburger-menu" aria-label="Toggle Navigation" id="mobile-menu-btn">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="mobile-nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html" style="color: var(--primary);">Gallery</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="contact.html" class="btn-primary" style="height: 36px; padding: 8px 16px; font-size: 14px;">Let's Talk</a>
      </div>
    </div>
  </nav>

  <main id="swup" class="transition-fade">
    <section class="gallery-header dark-mode">
      <div class="container" style="text-align: center;">
        <h1 class="display-xl" id="gallery-title" style="margin-bottom: var(--spacing-xl); text-align: center; width: 100%;">Our <span class="text-gradient-primary">Masterpieces.</span></h1>
        
        <div class="gallery-controls" style="display: flex; flex-direction: column; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
          <div class="filter-pills" id="gallery-filters">
            <button class="sub-nav-pill active" data-filter="all">All Work</button>
            <button class="sub-nav-pill" data-filter="image">Brand Aesthetics</button>
            <button class="sub-nav-pill" data-filter="video">Video & Ads</button>
            <button class="sub-nav-pill" data-filter="website">Websites</button>
          </div>
          <div class="layout-switcher" id="layout-switcher" style="display: flex; gap: 8px;">
            <button class="btn-icon active" data-layout="masonry" title="Masonry Grid" style="border-color: var(--primary); color: var(--primary);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="11"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="18" width="7" height="3"></rect></svg>
            </button>
            <button class="btn-icon" data-layout="list" title="Hover List">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="background-color: var(--surface-bone); padding: var(--spacing-section) 0; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline);">
      <div class="container">
        <div id="loading" class="loading-spinner">Loading database...</div>
        <div class="gallery-grid" id="gallery-grid">
          <!-- Cards injected via JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Component -->
  <kirmada-footer></kirmada-footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://unpkg.com/swup@4"></script>
  <script src="app.js?v=5"></script>
  <script src="advanced-interactions.js?v=5"></script>

  <!-- Premium Floating AI Chatbot -->
  <div id="ai-chat-widget" class="ai-chat-widget">
    <!-- The Floating Button -->
    <div class="ai-chat-button" id="ai-chat-toggle">
      <div class="ai-chat-glow"></div>
      <div class="ai-chat-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          <circle cx="9" cy="10" r="1" fill="currentColor"></circle>
          <circle cx="15" cy="10" r="1" fill="currentColor"></circle>
        </svg>
      </div>
    </div>

    <!-- The Chat Window -->
    <div class="ai-chat-window hidden" id="ai-chat-window">
      <div class="ai-chat-header">
        <div class="ai-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
            <rect x="9" y="9" width="6" height="6"></rect>
            <line x1="9" y1="1" x2="9" y2="4"></line>
            <line x1="15" y1="1" x2="15" y2="4"></line>
            <line x1="9" y1="20" x2="9" y2="23"></line>
            <line x1="15" y1="20" x2="15" y2="23"></line>
            <line x1="20" y1="9" x2="23" y2="9"></line>
            <line x1="20" y1="14" x2="23" y2="14"></line>
            <line x1="1" y1="9" x2="4" y2="9"></line>
            <line x1="1" y1="14" x2="4" y2="14"></line>
          </svg>
        </div>
        <div class="ai-header-info">
          <h4>Kirmada Assistant</h4>
          <span class="ai-status"><span class="wa-dot"></span> Online</span>
        </div>
        <button class="ai-close-btn" id="ai-chat-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="ai-chat-messages" id="ai-chat-messages">
        <!-- Messages will be injected here -->
        <div class="ai-message bot-message">
          <p>Hi! I'm the Kirmada AI. How can I help you scale your brand today?</p>
        </div>
      </div>

      <div class="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Type a message..." autocomplete="off">
        <button id="ai-chat-send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/swup@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="app.js?v=2"></script>
  <script src="advanced-interactions.js?v=4"></script>
  <script type="module" src="dynamic-data.js"></script>
  <script type="module" src="chatbot.js"></script>
  <script src="custom-dropdown.js?v=3"></script>
  <script src="footer-component.js"></script>
</body>
</html>
